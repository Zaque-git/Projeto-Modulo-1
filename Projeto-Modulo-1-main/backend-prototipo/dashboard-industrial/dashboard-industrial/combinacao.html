<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combinação - Dashboard Industrial</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="brand" href="dashboard.html">
        <div class="brand-mark">IA</div>
        <span>Inventário Automotivo</span>
      </a>
      <div class="nav-links">
        <a class="nav-link" href="dashboard.html">Painel</a>
        <a class="nav-link" href="armazem.html">Armazém</a>
        <a class="nav-link active" href="combinacao.html">Combinação</a>
      </div>
      <div class="nav-user">
        <span id="user-name">Operador</span>
        <a class="logout-btn" href="index.html">Sair</a>
      </div>
    </div>
  </nav>

  <main class="page page-combinacao">
    <header class="page-header">
      <div>
        <h1 class="page-title">Combinação - Assistente de Diagnóstico</h1>
        <p class="page-subtitle">Sistema inteligente de compatibilidade e resolução de problemas</p>
      </div>
    </header>

    <div class="combinacao-container">
      
      <section class="card combinacao-form-card">
        <div class="card-body">
          <form id="form-diagnose" autocomplete="off" class="form-horizontal">
            
            <div class="field field-horizontal" style="position: relative;">
              <label class="label" for="part-name">Peça Desejada</label>
              <input type="text" id="part-name" class="input" placeholder="Ex: Pastilha de Freio" />
              <div id="part-suggestions" class="autocomplete-suggestions"></div>
            </div>
            
            <div class="field field-horizontal" style="position: relative;">
              <label class="label" for="part-brand">Marca da Peça</label>
              <input type="text" id="part-brand" class="input" placeholder="Ex: Bosch" />
              <div id="brand-suggestions" class="autocomplete-suggestions"></div>
            </div>

            <div class="field field-horizontal" style="position: relative;">
              <label class="label" for="car-model">Marca/Modelo do Carro</label>
              <input type="text" id="car-model" class="input" placeholder="Ex: Volkswagen Gol" />
              <div id="car-suggestions" class="autocomplete-suggestions"></div>
            </div>

            <div class="field field-horizontal" style="position: relative;">
              <label class="label" for="car-year">Ano</label>
              <input type="text" id="car-year" class="input" placeholder="Ex: 2020" />
              <div id="year-suggestions" class="autocomplete-suggestions"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-analyze">
              <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              Analisar
            </button>
          </form>
        </div>
      </section>

      <div id="result" class="combinacao-result-side">
        <div class="card empty-state-card">
          <div class="card-body empty">
            <div class="search-illustration">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </div>
            <p>Insira qualquer informação acima para realizar uma busca flexível no armazém</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="js/combinacao.js"></script>
</body>
</html>
